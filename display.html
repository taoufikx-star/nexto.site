<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexto – Affichage public</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .display-screen { background: #0a1c2a; color: white; text-align: center; padding: 3rem 1rem; border-radius: 2rem; }
    .current-number { font-size: 8rem; font-weight: bold; letter-spacing: 8px; margin: 1rem 0; }
    .counter { font-size: 2rem; margin: 1rem 0; }
    .last-called { display: flex; justify-content: center; gap: 2rem; font-size: 1.5rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <div class="logo">Nexto – Affichage des tickets</div>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="ticket.html">Prendre ticket</a>
        <a href="queue.html">File d’attente</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="display-screen">
      <div class="current-number">B12</div>
      <div class="counter">Guichet 2</div>
      <div class="message">Veuillez vous diriger vers votre guichet</div>
      <div class="last-called">
        <span>Derniers appelés :</span>
        <span>B09</span> <span>B10</span> <span>B11</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">Mise à jour en temps réel – Rendez-vous au guichet indiqué</div>
  </footer>
</body>
</html>
