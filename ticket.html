<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nexto - Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="btn-nav">← ACCUEIL</a>
    </div>
    <div class="card-box">
        <h2>Sélectionnez un Service</h2>
        <form action="genere.html" class="radio-group">
            <div class="radio-item">
                <input type="radio" name="s" id="s1" checked>
                <label for="s1" class="radio-label">Administratif</label>
            </div>
            <div class="radio-item">
                <input type="radio" name="s" id="s2">
                <label for="s2" class="radio-label">Paiement</label>
            </div>
            <div class="radio-item">
                <input type="radio" name="s" id="s3">
                <label for="s3" class="radio-label">Support Technique</label>
            </div>
            <button type="submit" class="btn btn-black" style="margin-top: 20px; width: 100%;">Imprimer le Ticket</button>
        </form>
    </div>
</body>
</html>
