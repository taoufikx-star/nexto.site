<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir un service - Nexto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo"><div class="logo-box">N</div> Nexto</a>
        <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Retour</a>
    </header>

    <main class="container" style="max-width: 600px; padding-top: 4rem;">
        <div class="card">
            <h2 style="font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem;">Bienvenue sur Nexto</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2.5rem;">Prenez un ticket pour votre service administratif</p>

            <form action="genere.html">
                <div class="service-grid">
                    <label class="service-card">
                        <input type="radio" name="service" value="id" checked>
                        <div class="service-content">
                            <div class="service-icon">📇</div>
                            <span style="font-size: 1.125rem; font-weight: 700;">Carte d'identité / Passeport</span>
                        </div>
                    </label>

                    <label class="service-card">
                        <input type="radio" name="service" value="permis">
                        <div class="service-content">
                            <div class="service-icon">🚗</div>
                            <span style="font-size: 1.125rem; font-weight: 700;">Permis de conduire</span>
                        </div>
                    </label>

                    <label class="service-card">
                        <input type="radio" name="service" value="residence">
                        <div class="service-content">
                            <div class="service-icon">🏠</div>
                            <span style="font-size: 1.125rem; font-weight: 700;">Certificat de résidence</span>
                        </div>
                    </label>

                    <label class="service-card">
                        <input type="radio" name="service" value="taxes">
                        <div class="service-content">
                            <div class="service-icon">📄</div>
                            <span style="font-size: 1.125rem; font-weight: 700;">Impôts / Taxes</span>
                        </div>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1.125rem; border-radius: 16px;">
                    Prendre un ticket
                </button>
            </form>

            <div style="margin-top: 2rem; padding: 1.25rem; background: #f3f4f6; border-radius: 16px; display: flex; align-items: center; gap: 1rem; color: #666;">
                <span style="font-size: 1.25rem;">ℹ️</span>
                <p style="font-size: 0.875rem; font-weight: 500;">Veuillez patienter après avoir pris votre ticket</p>
            </div>
        </div>
    </main>
</body>
</html>
