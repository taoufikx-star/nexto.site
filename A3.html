<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>File d'attente - Nexto</title>
  <link rel="stylesheet" href="A.css">
</head>
<body>
  <header class="main-header">
    <div class="navbar">
      <div class="logo">Nexto</div>
      <ul class="nav-links">
        <li><a href="A.html">Accueil</a></li>
        <li><a href="A1.html">Prendre un ticket</a></li>
        <li><a href="A3.html">File d'attente</a></li>
        <li><a href="A4.html">Admin</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <h2>File d'attente</h2>
    <table class="data-table" id="queueTable">
      <thead>
        <tr><th>Numéro</th><th>Service</th><th>Statut</th></tr>
      </thead>
      <tbody id="queueBody"></tbody>
    </table>
    <div class="waiting-stats" id="estTime"></div>
    <button id="refreshBtn" class="btn btn-sm">Actualiser</button>
  </main>

  <footer class="footer"><p>© Nexto</p></footer>

  <script>
    function renderQueue() {
      const tickets = JSON.parse(localStorage.getItem('nextoTickets')) || [];
      const sorted = [...tickets].sort((a,b) => new Date(a.fullDate) - new Date(b.fullDate));
      const filtered = sorted.filter(t => t.status !== 'completed');
      const tbody = document.getElementById('queueBody');
      tbody.innerHTML = '';
      filtered.forEach(t => {
        let statusText = t.status === 'waiting' ? 'En attente' : (t.status === 'in_progress' ? 'En cours' : 'Terminé');
        const row = `<tr><td>${t.ticketNumber}</td><td>${t.service}</td><td>${statusText}</td></tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
      });
      const waitingCount = filtered.filter(t=>t.status==='waiting').length;
      const estMin = waitingCount * 6;
      document.getElementById('estTime').innerHTML = `⏱️ Temps d'attente estimé : ${estMin} minutes (environ ${waitingCount} ticket(s) avant vous si vous prenez ticket maintenant)`;
    }

    document.getElementById('refreshBtn').addEventListener('click', renderQueue);
    renderQueue();
  </script>
</body>
</html>
