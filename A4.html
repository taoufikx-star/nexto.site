<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Nexto</title>
  <link rel="stylesheet" href="A.css">
</head>
<body>
  <header class="main-header">
    <div class="navbar">
      <div class="logo">Nexto Admin</div>
      <ul class="nav-links">
        <li><a href="A.html">Accueil</a></li>
        <li><a href="A1.html">Prendre un ticket</a></li>
        <li><a href="A3.html">File d'attente</a></li>
        <li><a href="A4.html">Admin</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <h2>Admin Panel</h2>

    <div class="current-ticket-card" id="currentTicketCard">
      <h3>INFORMATIONS ACTUELLES</h3>
      <div class="big-number" id="currentTicketNumber">---</div>
      <div id="currentGuichet">GUICHET</div>
    </div>

    <div class="admin-actions">
      <button id="callNextBtn" class="btn">📢 APPELER SUIVANT</button>
      <button id="cancelTicketBtn" class="btn btn-danger">❌ ANNULER TICKET</button>
      <button id="resetQueueBtn" class="btn btn-warning">🔄 RÉINITIALISER</button>
    </div>

    <h3>FILE D'ATTENTE (Tickets en attente)</h3>
    <div id="waitingList" style="margin-bottom: 2rem;"></div>

    <h3>HISTORIQUE - TICKETS TERMINÉS</h3>
    <table class="data-table history-table">
      <thead><tr><th>NUMÉRO</th><th>HEURE</th><th>GUICHET</th><th>STATUT</th></tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
  </main>

  <footer class="footer"><p>© Nexto - Administration</p></footer>

  <script>
    function getGuichetForTicket(ticket) {
      if(ticket.service.includes('Carte')) return 'Guichet 1';
      if(ticket.service.includes('Permis')) return 'Guichet 2';
      if(ticket.service.includes('Certificat')) return 'Guichet 3';
      return 'Guichet 4';
    }

    function renderAdmin() {
      let tickets = JSON.parse(localStorage.getItem('nextoTickets')) || [];
      const current = tickets.find(t => t.status === 'in_progress');
      if(current) {
        document.getElementById('currentTicketNumber').innerText = current.ticketNumber;
        document.getElementById('currentGuichet').innerHTML = current.guichet || getGuichetForTicket(current);
      } else {
        document.getElementById('currentTicketNumber').innerText = '---';
        document.getElementById('currentGuichet').innerHTML = 'Aucun ticket';
      }

      const waiting = tickets.filter(t => t.status === 'waiting').sort((a,b)=>new Date(a.fullDate)-new Date(b.fullDate));
      const waitingDiv = document.getElementById('waitingList');
      waitingDiv.innerHTML = '';
      if(waiting.length === 0) waitingDiv.innerHTML = '<p>Aucun ticket en attente</p>';
      waiting.forEach((t, idx) => {
        const waitMin = (idx+1)*6;
        const div = document.createElement('div');
        div.className = 'waiting-item';
        div.innerHTML = `<strong>${t.ticketNumber}</strong> - ${t.service} <span style="color:#1e6f5c;">Temps d'attente: ${waitMin} min</span>`;
        waitingDiv.appendChild(div);
      });

      const history = tickets.filter(t => t.status === 'completed').sort((a,b)=>new Date(b.fullDate)-new Date(a.fullDate)).slice(0,10);
      const historyBody = document.getElementById('historyBody');
      historyBody.innerHTML = '';
      history.forEach(t => {
        const row = `<tr><td>${t.ticketNumber}</td><td>${t.timestamp}</td><td>${t.guichet || getGuichetForTicket(t)}</td><td>Terminé</td></tr>`;
        historyBody.insertAdjacentHTML('beforeend', row);
      });
    }

    function callNext() {
      let tickets = JSON.parse(localStorage.getItem('nextoTickets'));
      const currentIndex = tickets.findIndex(t => t.status === 'in_progress');
      if(currentIndex !== -1) {
        tickets[currentIndex].status = 'completed';
      }
      const nextIndex = tickets.findIndex(t => t.status === 'waiting');
      if(nextIndex !== -1) {
        tickets[nextIndex].status = 'in_progress';
        if(!tickets[nextIndex].guichet) tickets[nextIndex].guichet = getGuichetForTicket(tickets[nextIndex]);
      } else {
        alert("Aucun ticket en attente");
      }
      localStorage.setItem('nextoTickets', JSON.stringify(tickets));
      renderAdmin();
    }

    function cancelCurrent() {
      let tickets = JSON.parse(localStorage.getItem('nextoTickets'));
      const currentIndex = tickets.findIndex(t => t.status === 'in_progress');
      if(currentIndex !== -1) {
        tickets[currentIndex].status = 'completed';
        localStorage.setItem('nextoTickets', JSON.stringify(tickets));
        renderAdmin();
      } else {
        alert("Aucun ticket en cours");
      }
    }

    function resetQueue() {
      if(confirm("Réinitialiser toute la file ? Tous les tickets non terminés deviendront terminés.")) {
        let tickets = JSON.parse(localStorage.getItem('nextoTickets'));
        tickets.forEach(t => {
          if(t.status !== 'completed') t.status = 'completed';
        });
        localStorage.setItem('nextoTickets', JSON.stringify(tickets));
        renderAdmin();
      }
    }

    document.getElementById('callNextBtn').addEventListener('click', callNext);
    document.getElementById('cancelTicketBtn').addEventListener('click', cancelCurrent);
    document.getElementById('resetQueueBtn').addEventListener('click', resetQueue);
    renderAdmin();
  </script>
</body>
</html>
